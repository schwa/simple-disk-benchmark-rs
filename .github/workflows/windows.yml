name: Windows

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Build
        run: cargo build --verbose
      - name: Run tests
        run: cargo test --verbose
